name: Bug report
description: Report something in Cros that is broken or behaving incorrectly.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve Cros. Remove personal information and secrets before submitting.
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Explain what you expected and what happened instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. Open...\n2. Select...\n3. See..."
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Cros version or commit
  - type: dropdown
    id: windows
    attributes:
      label: Windows version
      options:
        - Windows 11
        - Windows 10
        - Other
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Additional details
      description: Add sanitized logs or screenshots. Never include API keys, credentials, addresses, or private case data.
  - type: checkboxes
    id: checks
    attributes:
      label: Safety check
      options:
        - label: I removed secrets and personal information from this report.
          required: true
